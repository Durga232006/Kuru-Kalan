<!doctype html>
<html>

<head>
  <title>Admin Login - Smart Paddy Storage</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- HEADER -->
  <header class="gov-header">
    <h1 data-lang-key="nav-title">🌾 Kuru Kalan</h1>
    <button class="hamburger" onclick="toggleMenu()">☰</button>
    <nav>
      <a href="index.html" data-lang-key="nav-home">Home</a>
      <a href="book.html" data-lang-key="nav-book">Book a Slot</a>
      <a href="admin-login.html" data-lang-key="nav-admin">Admin Login</a>
      <a href="centers.html" data-lang-key="nav-centers">Storage Centers</a>
      <a href="contact.html" data-lang-key="nav-contact">Contact</a>
      <button id="langToggleBtn"
        style="background:#ffd54f;border:none;padding:5px 10px;border-radius:4px;cursor:pointer;font-weight:bold;margin-left:10px;">தமிழ்</button>
    </nav>
  </header>

  <div class="admin-container">
    <div class="admin-card" id="loginCard">
      <h2 data-lang-key="admin-login">Admin Login</h2>
      <p data-lang-key="admin-sub" class="sub-text">Authorized Personnel Only</p>

      <div class="input-group">
        <label data-lang-key="label-admin-id">Username</label>
        <input type="text" id="username" placeholder="Enter username" data-lang-key="placeholder-username" />
      </div>

      <div class="input-group">
        <label data-lang-key="label-admin-pass">Password</label>
        <input type="password" id="password" placeholder="Enter password" data-lang-key="placeholder-password" />
      </div>

      <button class="submit-btn" onclick="login()" data-lang-key="btn-login">Login</button>
    </div>
  </div>

  <!-- TRANSLATION SCRIPT -->
  <script src="lang.js"></script>

  <script>
    const ADMIN_USERNAME = "admin";
    const ADMIN_PASSWORD = "admin123";

    function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
        // Redirect to dashboard page
        window.location.href = "admin-dashboard.html";
      } else {
        alert("Invalid username or password");
      }
    }
  </script>
</body>

</html>
